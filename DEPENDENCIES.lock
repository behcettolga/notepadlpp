# DEPENDENCIES.lock — pinned working set for NotepadL++ (resolved at M0)
#
# Toolchain: FPC 3.2.2, Lazarus 3.0 (distro), widgetset gtk2.
# Build via:  ./ci.sh   (uses lazbuild --lazarusdir=deps/lazarus-im --ws=gtk2)
#
# IMPORTANT (gtk2 IME): upstream ATSynEdit calls IM_Context_Set_Cursor_Pos, which the
# LCL only exports when compiled with the WITH_GTK2_IM define. Stock distro LCL is built
# WITHOUT it. We do NOT modify the system Lazarus. Instead:
#   1. A user-owned copy of the Lazarus tree lives at deps/lazarus-im (see scripts/setup-deps.sh).
#   2. Each project .lpi carries a 'SharedMatrixOptions' custom option -dWITH_GTK2_IM applied
#      to Targets '#project,LCL', so lazbuild recompiles the gtk2 LCL with the define.
#   3. All builds pass --lazarusdir=deps/lazarus-im so that recompile is writable.
#
